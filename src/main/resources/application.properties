# Application
spring.application.name=baseball-ai

# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/baseball_analytics
spring.datasource.username=baseball_app
spring.datasource.password=${DB_PASSWORD:baseball_local_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.liquibase=INFO